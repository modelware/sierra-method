# oml-code settings
oml-code:
  schemaVersion: 1

# project npm settings
project:
  name: "@oml/fireforce6"
  version: 0.1.0
  title: Fire Force VI
  description: The Fire Force VI architecture

# source folders
sources:
  - src

# oml server settings
server:
  port: 8080

# oml-cli parameter defaults
defaults:
  export: -o build/owl
  reason: -o build/owl -t
  render: -m src/model/md -b build/web -c src/model/oml/fireforce6.github.io/mission-control/bundle.oml
